<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Contacto - Cencosud</title>
    <!-- vinculamos la hoja de estilos general -->
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- La barra estatica de arriba de todo -->
    <div id="barra-superior">
        <img src="imagenes/Cencosud_logo.png" alt="Logo Cencosud" id="logo-en-barra">
    </div>

    <!-- Menu de navegacion de la izquierda -->
    <div id="menu-lateral">
        <a href="index.html" class="boton-menu" title="Inicio">
            <svg viewBox="0 0 24 24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg>
        </a>
        <a href="servicios.html" class="boton-menu" title="Servicios">
            <svg viewBox="0 0 24 24">
                <path
                    d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z" />
            </svg>
        </a>
        <a href="contacto.html" class="boton-menu activo" title="Contacto">
            <svg viewBox="0 0 24 24">
                <path
                    d="M6.62 10.79c1.44 2.83 3.76 5.15 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" />
            </svg>
        </a>
    </div>

    <!-- Contenedor general -->
    <div id="contenedor-principal">

        <div id="seccion-contacto">
            <h2>Formulario de contacto</h2>

            <form id="formulario-estudiante" action="#" method="POST">

                <div class="form-grupo fila-completa">
                    <label for="cedula">Cédula</label>
                    <input type="number" id="cedula" name="cedula" placeholder="Ingrese su cédula" required>
                </div>

                <div class="form-grupo">
                    <label for="nombres">Nombres</label>
                    <input type="text" id="nombres" name="nombres" placeholder="Ej. Jonatan" required>
                </div>

                <div class="form-grupo">
                    <label for="apellidos">Apellidos</label>
                    <input type="text" id="apellidos" name="apellidos" placeholder="Ej. Puerto" required>
                </div>

                <div class="form-grupo fila-completa">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
                </div>

                <div class="form-grupo">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Nombre de usuario" required>
                </div>

                <div class="form-grupo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Su contraseña" required>
                </div>

                <!-- Boton para mandar -->
                <button type="submit" id="boton-enviar">Enviar por WhatsApp</button>
            </form>
        </div>

        <!-- El pie de pagina que va abajo -->
        <div id="pie-de-pagina">
            <div class="texto-footer">
                <p>Página web realizada para fines netamente académicos por: Jonatan Puerto &copy; 2026</p>
            </div>
            <div id="div-redes-sociales">
                <a href="https://www.facebook.com/PuntosCencosudCo/" target="_blank" title="Facebook Cencosud">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M22.675 0H1.325C.593 0 0 .593 0 1.325v21.351C0 23.407.593 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116c.73 0 1.323-.593 1.323-1.325V1.325C24 .593 23.407 0 22.675 0z" />
                    </svg>
                </a>
                <a href="https://x.com/PuntosCencosud" target="_blank" title="Twitter Cencosud">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
                    </svg>
                </a>
                <a href="https://www.instagram.com/puntoscencosud/" target="_blank" title="Instagram Cencosud">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z" />
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('formulario-estudiante').addEventListener('submit', function (e) {
            e.preventDefault(); // Evitamos que rercargue la pagina

            // Sacamos todos los valores del formulario
            var cedula = document.getElementById('cedula').value;
            var nombres = document.getElementById('nombres').value;
            var apellidos = document.getElementById('apellidos').value;
            var email = document.getElementById('email').value;
            var usuario = document.getElementById('usuario').value;
            var password = document.getElementById('password').value;

            // Armamos el texto para whatsapp
            var texto = "Hola, aquí envío mis datos de contacto:%0A" +
                "- Cédula: " + cedula + "%0A" +
                "- Nombres: " + nombres + "%0A" +
                "- Apellidos: " + apellidos + "%0A" +
                "- Email: " + email + "%0A" +
                "- Usuario: " + usuario + "%0A" +
                "- Contraseña: " + password;

            // Api de whatsapp al numero pedido
            var urlWhatsapp = "https://api.whatsapp.com/send?phone=573222802393&text=" + texto;

            // abrimos la url
            window.open(urlWhatsapp, '_blank');
        });
    </script>
</body>

</html>
